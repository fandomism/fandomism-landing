<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fandomism</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="canonical" href="https://fandomism.com/" />

    <link
      rel="icon"
      type="image/png"
      href="/fandomism-favicon.png"
      sizes="32x32"
    />

    <meta
      name="description"
      content="Fandomism explores fandom as culture, identity, and community."
    />

    <style>
      :root {
        --bg: #ede6d8;
        --text: #111;

        --footerH: 30px;
        --footerPadBottom: 8px;

        --logoW: clamp(170px, 18vw, 285px);
        --logoARw: 10506;
        --logoARh: 3697;

        --productBox: min(42vw, 440px, 46dvh);
        --arrowSize: 22px;

        --pagePadY: clamp(24px, 5vh, 46px);
        --stagePadTop: clamp(14px, 4vh, 42px);
        --stagePadBottom: 14px;
        --stackGap: 12px;
      }

      @supports not (height: 1dvh) {
        :root {
          --productBox: min(42vw, 440px, 46vh);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        text-align: center;
        overflow: hidden;
      }

      .page {
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .site-header {
        flex: 0 0 auto;
        display: flex;
        justify-content: center;
        padding-top: var(--pagePadY);
      }

      .site-logo {
        width: var(--logoW);
        height: auto;
        aspect-ratio: calc(var(--logoARw) / var(--logoARh));
        object-fit: contain;
        display: block;
      }

      .stage {
        flex: 1 1 auto;
        min-height: 0;

        display: grid;
        grid-template-rows: auto auto;
        align-content: center;
        justify-items: center;
        row-gap: var(--stackGap);

        padding: var(--stagePadTop) 0 var(--stagePadBottom);
      }

      .carousel {
        width: 100%;
        display: grid;
        grid-template-columns: 28px var(--productBox) 28px;
        align-items: center;
        justify-content: center;
        gap: clamp(28px, 8vw, 120px);
      }

      .carousel-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
          Helvetica, Arial, sans-serif;
        font-size: var(--arrowSize);
        line-height: 1;
        cursor: pointer;
        padding: 4px;
        opacity: 0.34;
        transition: opacity 0.2s ease;
      }

      .carousel-button:hover {
        opacity: 0.7;
      }

      .carousel-button:focus-visible {
        outline: 1px solid rgba(0, 0, 0, 0.45);
        outline-offset: 6px;
      }

      .product-image-wrap {
        width: var(--productBox);
        height: var(--productBox);
        display: grid;
        place-items: center;
      }

      .product-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        cursor: pointer;
        user-select: none;
      }

      .meta-slot {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 0;
      }

      .meta {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--stackGap);
      }

      .buy-link {
        border-bottom: 0;
        padding-bottom: 0;
        line-height: 1.35;
      }

      .nod {
        font-family: Palatino, "Palatino Linotype", "Book Antiqua", serif;
        font-size: 10px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        opacity: 0.6;
        transition: opacity 0.25s ease;
      }

      .nod:hover {
        opacity: 0.9;
      }

      a {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
          Helvetica, Arial, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text);
        text-decoration: none;
        border-bottom: 2px solid var(--text);
        padding-bottom: 4px;
      }

      a:hover {
        opacity: 0.6;
      }

      .site-footer {
        flex: 0 0 auto;

        min-height: calc(var(--footerH) + env(safe-area-inset-bottom));
        padding-bottom: calc(
          var(--footerPadBottom) + env(safe-area-inset-bottom)
        );

        display: flex;
        align-items: flex-end;
        justify-content: center;

        font-size: 11px;
        letter-spacing: 0.04em;
        color: rgba(0, 0, 0, 0.3);
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial,
          sans-serif;
        pointer-events: none;
      }

      .seo {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      @media (prefers-reduced-motion: no-preference) {
        .site-logo,
        .carousel,
        .meta {
          opacity: 0;
          transform: translateY(6px);
          animation: fadeUp 500ms ease forwards;
        }

        .carousel {
          animation-delay: 80ms;
        }

        .meta {
          animation-delay: 140ms;
        }

        @keyframes fadeUp {
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      }

      @media (max-width: 640px) {
        :root {
          --logoW: clamp(150px, 48vw, 220px);
          --productBox: min(74vw, 360px, 42dvh);
          --arrowSize: 21px;
          --stackGap: 10px;
        }

        @supports not (height: 1dvh) {
          :root {
            --productBox: min(74vw, 360px, 42vh);
          }
        }

        .carousel {
          grid-template-columns: 24px var(--productBox) 24px;
          gap: 14px;
        }
      }

      @media (max-height: 720px) {
        :root {
          --productBox: min(38vw, 360px, 40dvh);
          --pagePadY: 20px;
          --stagePadTop: 14px;
          --stackGap: 9px;
        }

        @supports not (height: 1dvh) {
          :root {
            --productBox: min(38vw, 360px, 40vh);
          }
        }

        .site-footer {
          font-size: 10px;
        }
      }

      @media (min-width: 1800px) {
        :root {
          --logoW: 300px;
          --productBox: min(38vw, 470px, 46dvh);
        }

        @supports not (height: 1dvh) {
          :root {
            --productBox: min(38vw, 470px, 46vh);
          }
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header class="site-header">
        <img
          class="site-logo"
          src="fandomism-logo.png"
          alt="Fandomism logo"
          width="10506"
          height="3697"
        />
      </header>

      <main class="stage">
        <section class="carousel" aria-label="Fandomism hat carousel">
          <button
            class="carousel-button"
            type="button"
            data-direction="prev"
            aria-label="Previous image"
          >
            ←
          </button>

          <div class="product-image-wrap">
            <img
              id="product-image"
              class="product-image"
              src="Fandomism_Hat_Black_front.png"
              alt="Fandomism black hat, front view"
            />
          </div>

          <button
            class="carousel-button"
            type="button"
            data-direction="next"
            aria-label="Next image"
          >
            →
          </button>
        </section>

        <div class="meta-slot">
          <div class="meta">
            <a
              class="buy-link"
              href="https://square.link/u/H9d5udfB"
              target="_blank"
              rel="noopener"
            >
              $40<br />Buy
            </a>

            <div class="nod">One of us</div>

            <a href="mailto:fandomismllc@gmail.com?subject=Fandomism%20Inquiry">
              Contact
            </a>
          </div>
        </div>

        <div class="seo">
          Fandomism is a cultural research and creative platform exploring fandom,
          identity, community, media, and modern participation.
        </div>
      </main>

      <footer class="site-footer">
        © 2026 Fandomism LLC. All rights reserved.
      </footer>
    </div>

    <script>
      const productImages = [
        {
          src: "Fandomism_Hat_Black_front.png",
          alt: "Fandomism black hat, front view"
        },
        {
          src: "Fandomism_Hat_Black_right.PNG",
          alt: "Fandomism black hat, right side view"
        },
        {
          src: "Fandomism_Hat_Black_back.PNG",
          alt: "Fandomism black hat, back view"
        },
        {
          src: "Fandomism_Hat_Black_left.PNG",
          alt: "Fandomism black hat, left side view"
        }
      ];

      const image = document.getElementById("product-image");
      const buttons = document.querySelectorAll(".carousel-button");
      let currentIndex = 0;

      productImages.forEach((item) => {
        const preload = new Image();
        preload.src = item.src;
      });

      function updateCarousel(direction) {
        const offset = direction === "next" ? 1 : -1;

        currentIndex =
          (currentIndex + offset + productImages.length) % productImages.length;

        image.src = productImages[currentIndex].src;
        image.alt = productImages[currentIndex].alt;
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          updateCarousel(button.dataset.direction);
        });
      });

      image.addEventListener("click", () => {
        updateCarousel("next");
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") updateCarousel("prev");
        if (event.key === "ArrowRight") updateCarousel("next");
      });
    </script>
  </body>
</html>
