<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fandomism</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="canonical" href="https://fandomism.com/" />
    <link rel="icon" type="image/png" href="/fandomism-favicon.png" sizes="32x32" />
    <meta name="description" content="Fandomism explores fandom as culture, identity, and community." />

    <style>
      :root {
        --bg: #ede6d8;
        --text: #111;

        --footerH: 30px;
        --footerPadBottom: 8px;

        --logoW: clamp(165px, 16vw, 285px);
        --logoARw: 10506;
        --logoARh: 3697;

        --productBox: min(44vw, 500px, 44dvh);
        --arrowSize: 22px;
        --arrowGap: clamp(38px, 8vw, 120px);

        --pagePadTop: clamp(22px, 4.5vh, 44px);
        --stagePadTop: clamp(12px, 3vh, 36px);
        --buyGap: clamp(30px, 4.75vh, 52px);
        --contactGap: clamp(34px, 5.75vh, 68px);
      }

      @supports not (height: 1dvh) {
        :root { --productBox: min(44vw, 500px, 44vh); }
      }

      * { box-sizing: border-box; }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        text-align: center;
        overflow: hidden;
      }

      .page {
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .site-header {
        flex: 0 0 auto;
        display: flex;
        justify-content: center;
        padding-top: var(--pagePadTop);
      }

      .site-logo {
        width: var(--logoW);
        height: auto;
        aspect-ratio: calc(var(--logoARw) / var(--logoARh));
        object-fit: contain;
        display: block;
      }

      .stage {
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto auto;
        align-content: center;
        justify-items: center;
        padding: var(--stagePadTop) 0 18px;
      }

      .carousel {
        width: 100%;
        display: grid;
        grid-template-columns: 28px var(--productBox) 28px;
        align-items: center;
        justify-content: center;
        gap: var(--arrowGap);
      }

      .carousel-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
          Helvetica, Arial, sans-serif;
        font-size: var(--arrowSize);
        line-height: 1;
        cursor: pointer;
        padding: 4px;
        opacity: 0.34;
        transition: opacity 0.2s ease;
      }

      .carousel-button:hover { opacity: 0.7; }

      .product-image-wrap {
        width: var(--productBox);
        height: var(--productBox);
        display: grid;
        place-items: center;
      }

      .product-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        cursor: pointer;
        user-select: none;
        transform-origin: center center;
      }

      .product-image[data-view="front"] { transform: scale(1); }

      .product-image[data-view="right"],
      .product-image[data-view="left"],
      .product-image[data-view="back"] {
        transform: scale(1.2);
      }

      .buy-slot { margin-top: var(--buyGap); }

      .contact-slot { margin-top: var(--contactGap); }

      .contact-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .buy-link {
        border-bottom: 0;
        padding-bottom: 0;
        line-height: 1.35;
      }

      .nod {
        font-family: Palatino, "Palatino Linotype", "Book Antiqua", serif;
        font-size: 10px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        opacity: 0.6;
      }

      a {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
          Helvetica, Arial, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text);
        text-decoration: none;
        border-bottom: 2px solid var(--text);
        padding-bottom: 4px;
      }

      a:hover { opacity: 0.6; }

      .site-footer {
        flex: 0 0 auto;
        min-height: calc(var(--footerH) + env(safe-area-inset-bottom));
        padding-bottom: calc(var(--footerPadBottom) + env(safe-area-inset-bottom));
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-size: 11px;
        letter-spacing: 0.04em;
        color: rgba(0, 0, 0, 0.3);
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial,
          sans-serif;
        pointer-events: none;
      }

      .seo {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      @media (max-width: 900px) {
        :root {
          --logoW: clamp(175px, 42vw, 270px);
          --productBox: min(50vw, 420px, 40dvh);
          --arrowGap: clamp(28px, 7vw, 74px);
        }

        @supports not (height: 1dvh) {
          :root { --productBox: min(50vw, 420px, 40vh); }
        }
      }

      @media (max-width: 640px) {
        :root {
          --logoW: clamp(210px, 58vw, 310px);
          --productBox: min(62vw, 340px, 32dvh);
          --arrowSize: 25px;
          --arrowGap: clamp(18px, 5vw, 36px);
          --pagePadTop: clamp(28px, 4vh, 42px);
          --stagePadTop: clamp(42px, 7vh, 76px);
          --buyGap: clamp(34px, 5vh, 54px);
          --contactGap: clamp(40px, 6vh, 64px);
        }

        @supports not (height: 1dvh) {
          :root { --productBox: min(62vw, 340px, 32vh); }
        }

        .carousel {
          grid-template-columns: 26px var(--productBox) 26px;
        }

        .product-image[data-view="right"],
        .product-image[data-view="left"],
        .product-image[data-view="back"] {
          transform: scale(1.24);
        }
      }

      @media (max-height: 720px) {
        :root {
          --logoW: clamp(150px, 14vw, 240px);
          --productBox: min(34vw, 380px, 36dvh);
          --pagePadTop: 18px;
          --stagePadTop: 18px;
          --buyGap: 28px;
          --contactGap: 30px;
        }

        @supports not (height: 1dvh) {
          :root { --productBox: min(34vw, 380px, 36vh); }
        }

        .site-footer { font-size: 10px; }
      }

      @media (max-width: 640px) and (max-height: 780px) {
        :root {
          --logoW: clamp(190px, 52vw, 280px);
          --productBox: min(58vw, 310px, 30dvh);
          --stagePadTop: clamp(32px, 5vh, 56px);
          --buyGap: 28px;
          --contactGap: 34px;
        }
      }

      @media (min-width: 1800px) and (min-height: 900px) {
        :root {
          --logoW: 300px;
          --productBox: min(36vw, 520px, 46dvh);
        }

        @supports not (height: 1dvh) {
          :root { --productBox: min(36vw, 520px, 46vh); }
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header class="site-header">
        <img
          class="site-logo"
          src="fandomism-logo.png"
          alt="Fandomism logo"
          width="10506"
          height="3697"
        />
      </header>

      <main class="stage">
        <section class="carousel" aria-label="Fandomism hat carousel">
          <button class="carousel-button" type="button" data-direction="prev" aria-label="Previous image">←</button>

          <div class="product-image-wrap">
            <img
              id="product-image"
              class="product-image"
              src="Fandomism_Hat_Black_front.png"
              alt="Fandomism black hat, front view"
              data-view="front"
            />
          </div>

          <button class="carousel-button" type="button" data-direction="next" aria-label="Next image">→</button>
        </section>

        <div class="buy-slot">
          <a class="buy-link" href="https://square.link/u/H9d5udfB" target="_blank" rel="noopener">
            $40<br />Buy
          </a>
        </div>

        <div class="contact-slot">
          <div class="contact-block">
            <div class="nod">One of us</div>
            <a href="mailto:fandomismllc@gmail.com?subject=Fandomism%20Inquiry">Contact</a>
          </div>
        </div>

        <div class="seo">
          Fandomism is a cultural research and creative platform exploring fandom,
          identity, community, media, and modern participation.
        </div>
      </main>

      <footer class="site-footer">
        © 2026 Fandomism LLC. All rights reserved.
      </footer>
    </div>

    <script>
      const productImages = [
        { src: "Fandomism_Hat_Black_front.png", alt: "Fandomism black hat, front view", view: "front" },
        { src: "Fandomism_Hat_Black_right.PNG", alt: "Fandomism black hat, right side view", view: "right" },
        { src: "Fandomism_Hat_Black_back.PNG", alt: "Fandomism black hat, back view", view: "back" },
        { src: "Fandomism_Hat_Black_left.PNG", alt: "Fandomism black hat, left side view", view: "left" }
      ];

      const image = document.getElementById("product-image");
      const buttons = document.querySelectorAll(".carousel-button");
      let currentIndex = 0;

      productImages.forEach((item) => {
        const preload = new Image();
        preload.src = item.src;
      });

      function renderImage(index) {
        image.src = productImages[index].src;
        image.alt = productImages[index].alt;
        image.dataset.view = productImages[index].view;
      }

      function updateCarousel(direction) {
        const offset = direction === "next" ? 1 : -1;
        currentIndex = (currentIndex + offset + productImages.length) % productImages.length;
        renderImage(currentIndex);
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => updateCarousel(button.dataset.direction));
      });

      image.addEventListener("click", () => updateCarousel("next"));

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") updateCarousel("prev");
        if (event.key === "ArrowRight") updateCarousel("next");
      });
    </script>
  </body>
</html>
